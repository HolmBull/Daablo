<html lang="no">
<head>
<meta charset="UTF-8">
<title>Dablo (Sør-samisk regler)</title>
<style>
  body { font-family: Arial; text-align: center; }
  canvas { border: 1px solid black; margin-top: 20px; background:#f5deb3; }
</style>
</head>
<body>
<h1>Dablo – Sør-samisk brettspill</h1>
<p>Klikk på en brikke for å flytte/hoppe</p>
<canvas id="board" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

const size = 7;
const spacing = 80;
const offset = 50;
let selected = null;
let turn = "white";
let board = [];

function createPiece(player, type) {
  return { player, type };
}

function initBoard() {
  for (let y=0;y<size;y++){
    board[y]=[];
    for (let x=0;x<size;x++) board[y][x]=null;
  }

  for (let x=0;x<size;x++){
    board[0][x]=createPiece("black","warrior");
    board[1][x]=createPiece("black","warrior");
    board[5][x]=createPiece("white","warrior");
    board[6][x]=createPiece("white","warrior");
  }

  board[0][3]=createPiece("black","king");
  board[1][3]=createPiece("black","prince");
  board[6][3]=createPiece("white","king");
  board[5][3]=createPiece("white","prince");
}

const directions = [
  {dx:1, dy:0}, {dx:-1, dy:0}, {dx:0, dy:1}, {dx:0, dy:-1},
  {dx:1, dy:1}, {dx:-1, dy:1}, {dx:1, dy:-1}, {dx:-1, dy:-1}
];

function isValidMove(piece, x1,y1,x2,y2){
  if(x2<0 || x2>=size || y2<0 || y2>=size) return false;
  if(board[y2][x2]) return false;
  const dx = x2-x1;
  const dy = y2-y1;
  
  // Enkel flytting (ett steg langs linje)
  for(const dir of directions){
    if(dir.dx===dx && dir.dy===dy) return true;
  }

  // Sjekk hopp
  if(Math.abs(dx)===2 && Math.abs(dy)===0 || Math.abs(dx)===0 && Math.abs(dy)===2 || Math.abs(dx)===2 && Math.abs(dy)===2){
    const mx = x1 + dx/2;
    const my = y1 + dy/2;
    const middle = board[my][mx];
    if(!middle) return false;
    if(middle.player===piece.player) return false;
    if(piece.type==="warrior" && middle.type!=="warrior") return false;
    if(piece.type==="prince" && middle.type==="king") return false;
    return true;
  }
  return false;
}

function makeMove(x1,y1,x2,y2){
  const piece = board[y1][x1];
  const dx = x2-x1;
  const dy = y2-y1;
  if(Math.abs(dx)===2 || Math.abs(dy)===2){
    const mx = x1 + dx/2;
    const my = y1 + dy/2;
    board[my][mx] = null; // slå ut
  }
  board[y2][x2] = piece;
  board[y1][x1] = null;
}

function drawBoard(){
  ctx.clearRect(0,0,600,600);

  for (let y=0;y<size;y++){
    for (let x=0;x<size;x++){
      let px = offset + x*spacing;
      let py = offset + y*spacing;

      // punkt
      ctx.beginPath();
      ctx.arc(px,py,4,0,Math.PI*2);
      ctx.fill();

      // linjer høyre
      if (x<size-1){
        ctx.beginPath();
        ctx.moveTo(px,py);
        ctx.lineTo(px+spacing,py);
        ctx.stroke();
      }

      // linjer ned
      if (y<size-1){
        ctx.beginPath();
        ctx.moveTo(px,py);
        ctx.lineTo(px,py+spacing);
        ctx.stroke();
      }

      // diagonaler
      if (x<size-1 && y<size-1){
        ctx.beginPath();
        ctx.moveTo(px,py);
        ctx.lineTo(px+spacing,py+spacing);
        ctx.stroke();
      }
      if (x>0 && y<size-1){
        ctx.beginPath();
        ctx.moveTo(px,py);
        ctx.lineTo(px-spacing,py+spacing);
        ctx.stroke();
      }

      // tegn brikker
      const piece = board[y][x];
      if(piece){
        ctx.beginPath();
        ctx.arc(px, py, 20, 0, Math.PI*2);
        ctx.fillStyle = piece.player === "white" ? "#fff" : "#000";
        ctx.fill();
        ctx.strokeStyle = "black";
        ctx.stroke();
        ctx.fillStyle = piece.player === "white" ? "#000" : "#fff";
        ctx.font = "16px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        let symbol = piece.type === "king" ? "K" : piece.type === "prince" ? "P" : "W";
        ctx.fillText(symbol, px, py);
      }

      // marker valgt brikke
      if(selected && selected.x===x && selected.y===y){
        ctx.beginPath();
        ctx.arc(px, py, 25, 0, Math.PI*2);
        ctx.strokeStyle = "red";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.lineWidth = 1;
      }
    }
  }
}

canvas.addEventListener("click", e=>{
  const rect = canvas.getBoundingClientRect();
  const x = Math.round((e.clientX - rect.left - offset)/spacing);
  const y = Math.round((e.clientY - rect.top - offset)/spacing);

  if(x<0 || x>=size || y<0 || y>=size) return;

  if(selected){
    if(isValidMove(board[selected.y][selected.x], selected.x,selected.y,x,y)){
      makeMove(selected.x,selected.y,x,y);
      selected = null;
      turn = turn==="white"?"black":"white";
      checkWin();
    } else {
      selected = null;
    }
  } else if(board[y][x] && board[y][x].player===turn){
    selected = {x,y};
  }
  drawBoard();
});

function checkWin(){
  let whiteKing=false, blackKing=false;
  let whiteMoves=false, blackMoves=false;
  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){
      const p=board[y][x];
      if(!p) continue;
      if(p.type==="king" && p.player==="white") whiteKing=true;
      if(p.type==="king" && p.player==="black") blackKing=true;
      for(const dir of directions){
        const nx=x+dir.dx, ny=y+dir.dy;
        if(isValidMove(p,x,y,nx,ny)){
          if(p.player==="white") whiteMoves=true;
          else blackMoves=true;
        }
      }
    }
  }
  if(!whiteKing || !whiteMoves) alert("Svart vinner!");
  if(!blackKing || !blackMoves) alert("Hvit vinner!");
}

initBoard();
drawBoard();
</script>
</body>
</html>
